<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-background">
    <div class="flex flex-col gap-8 items-center justify-center h-screen ">
        <div class="flex flex-row justify-center bg-white rounded-2xl">

            <div class="flex flex-col justify-center items-center gap-4 bg-linear-to-t from-lightRoyalBlue to-violetBlue rounded-2xl text-white p-4 text-center">
                <h1 class="text-xl font-bold tracking-wide">Your Result</h1>
                <div class="flex flex-col items-center justify-center bg-linear-to-t from-lightSlateBlue to-lightRoyalBlue rounded-full w-48 h-48">
                    <h1 class="text-7xl">76</h1> 
                    <p>of 100</p>
                </div>
                <div class="w-xs">
                    <h1 class="text-xl font-bold tracking-wide">Great</h1>
                    <p class="">You scored higher than 65% of the people who have taken these tests.</p>
                </div>
            </div>

            <div class="flex flex-col gap-4 p-8 w-md">
                <h1 class="text-xl font-bold tracking-wide">Summary</h1>
                <div class="flex flex-row justify-between items-center p-4 bg-backgroundRed text-lightRed rounded-xl">
                    <div class="flex flex-row gap-1.5">
                        <img src="./src/assets/images/icon-reaction.svg" alt="">
                        <p>Reaction</p>
                    </div>
                    <p class="text-darkGreyBlue"><span class="font-bold text-darkGreyBlue">80</span> / 100</p>
                </div>

                <div class="flex flex-row justify-between items-center p-4 bg-backgroundOrangeYellow text-orangeYellow rounded-xl">
                    <div class="flex flex-row gap-1.5">
                        <img src="./src/assets/images/icon-memory.svg" alt="">
                        <p>Memory</p>
                    </div>
                    <p class="text-darkGreyBlue"><span class="font-bold text-darkGreyBlue">92</span> / 100</p>
                </div>

                <div class="flex flex-row justify-between items-center p-4 bg-backgroundGreenTeal text-greenTeal rounded-xl">
                    <div class="flex flex-row gap-1.5">
                        <img src="./src/assets/images/icon-verbal.svg" alt="">
                        <p>Verbal</p>
                    </div>
                    <p class="text-darkGreyBlue"><span class="font-bold text-darkGreyBlue">61</span> / 100</p>
                </div>

                <div class="flex flex-row justify-between items-center p-4 bg-backgroundCobaltBlue text-cobaltBlue rounded-xl">
                    <div class="flex flex-row gap-1.5">
                        <img src="./src/assets/images/icon-visual.svg" alt="">
                        <p>Visual</p>
                    </div>
                    <p class="text-darkGreyBlue"><span class="font-bold text-darkGreyBlue">73</span> / 100</p>
                </div>

                <button class="bg-darkGreyBlue text-white py-4 rounded-full">Continue</button>
            </div>
        </div>
    </div>

</body>
</html>
